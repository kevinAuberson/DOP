services:
  reverse-proxy:
    image: traefik:v2.10
    command:
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
  frontend:
    image: registry.gitlab.com/kevinauberson/dop-python-kevin/frontend:latest
    build: frontend/.
    ports:
      - "8080:80"
    labels:
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
  backend:
    image: registry.gitlab.com/kevinauberson/dop-python-kevin/backend:latest
    build: backend/.
    ports:
      - "8000:80"
    environment:
      - ROOT_PATH=/api
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - OTEL_RESOURCE_ATTRIBUTES=service.name=backend-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    labels:
      - "traefik.http.routers.backend.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.backend.middlewares=backend-stripprefix"
      - "traefik.http.middlewares.backend-stripprefix.stripprefix.prefixes=/api"
    depends_on:
      database:
        condition: service_healthy
    restart: always
  database:
    image: postgres:16-alpine
    ports:
      -  5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
  prometheus:
    image: prom/prometheus
    profiles: ["observability"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - 9090:9090
  jaeger:
    image: jaegertracing/all-in-one:1.52
    environment:
      COLLECTOR_OTLP_ENABLED: true
    ports:
      - "16686:16686" # UI
      - "4317:4317" # OTLP gRPC receiver
    restart: unless-stopped
  collector:
    image: otel/opentelemetry-collector-contrib:0.90.1
    volumes:
      - ./collector/config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317" # OTLP gRPC receiver
      - "55679:55679" # zPages
      - "8889" # Prometheus metrics
    environment:
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      - jaeger
    restart: unless-stopped
