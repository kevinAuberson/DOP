global:
  scrape_interval: 10s
scrape_configs:
  - job_name: 'fastapi'
    metrics_path: /api/metrics
    static_configs:
      - targets: ['backend:80']
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090
  - job_name: otel-collector
    static_configs:
      - targets:
          - collector:8889
