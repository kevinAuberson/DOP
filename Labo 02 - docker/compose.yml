version: '3.9'

services:
  frontend:
    build: frontend/.
    ports:
    - "80:80"
  backend:
    build: backend/.
    ports:
    - "8080:80"
  database:
    image: postgres:16-alpine
    ports:
      -  5432:5432
    volumes:
      - ./data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres