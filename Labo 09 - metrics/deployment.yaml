apiVersion: v1
kind: Namespace
metadata:
  name: kevinauberson
  labels:
    name: kevinauberson
---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dop-python-kevin-ingress
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  ingressClassName: nginx
  rules:
    - host: kevinauberson.dop.k8s.heig-vd.ch
    - http:
        paths:
          - path: /?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontend
                port:
                  number: 80
          - path: /api/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend
                port:
                  number: 80
---

apiVersion: v1
kind: ConfigMap
metadata:
  name: dop-python-kevin-configmap
data:
  postgres_user: postgres
  postgres_db: postgres
---

apiVersion: v1
kind: Secret
metadata:
  name: dop-python-kevin-secret
data:
  postgres_password: postgres
---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: database-data-pvc
spec:
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  resources:
    requests:
      storage: 128Mi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  selector:
    matchLabels:
      app: frontend
  replicas: 1
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: registry.gitlab.com/kevinauberson/dop-python-kevin/frontend:latest
        ports:
        - containerPort: 80
          name: web
        resources:
          limits:
            memory: "512Mi"
            cpu: "250m"
      imagePullSecrets:
      - name: regcred

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  ports:
    - port: 80
      targetPort: web
  selector:
    app: frontend

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  selector:
    matchLabels:
      app: backend
  replicas: 1
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
      - name: regcred
      containers:
      - image: registry.gitlab.com/kevinauberson/dop-python-kevin/backend:latest
        name: backend
        env:
        - name: POSTGRES_HOST
          value: database
        - name: POSTGRES_USER
          valueFrom:
              configMapKeyRef:
                name: dop-python-kevin-configmap
                key: postgres_user
        - name: POSTGRES_PASSWORD
          valueFrom:
              secretKeyRef:
                name: dop-python-kevin-secret
                key: postgres_password
        - name: POSTGRES_DB
          valueFrom:
              configMapKeyRef:
                name: dop-python-kevin-configmap
                key: postgres_db
        - name: ROOT_PATH
          value: /api
        ports:
        - containerPort: 80
          name: web
        resources:
          limits:
            memory: "512Mi"
            cpu: "250m"

---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  ports:
  - port: 80
  selector:
    app: backend

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
spec:
  selector:
    matchLabels:
      app: database
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: database
    spec:
      containers:
        - name: database
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: dop-python-kevin-configmap
                  key: postgres_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dop-python-kevin-secret
                  key: postgres_password
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: dop-python-kevin-configmap
                  key: postgres_db
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - mountPath: "/var/lib/postgresql/data"
              name: data
          resources:
            limits:
              memory: "512Mi"
              cpu: "250m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: database-data-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: database
spec:
  ports:
    - port: 5432
      targetPort: postgres
  selector:
    app: database
